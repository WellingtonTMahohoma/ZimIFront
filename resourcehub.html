<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resource Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Playfair Display", Georgia, serif;
    min-height: 100vh;
    padding: 120px 20px 20px 20px;

     background-color: black;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.feature-card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
    text-align: center;
}

.feature-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.feature-card h2 {
    color: #CE1126;
    margin-bottom: 10px;
}

.feature-card p {
    color: #444;
}


.section {
    display: none;
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    animation: slideIn 0.3s ease-out;
}

.section.active {
    display: block;
}

@keyframes slideIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.section h2 {
    color: #667eea;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: 600;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 6px;
}

textarea {
    min-height: 100px;
}


.btn-container {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary {
    background: #CE1126;
    color: white;
}

.btn-secondary {
    background: #ddd;
}

.btn-delete {
    background: #ff6b6b;
    color: white;
}

.item-list {
    display: grid;
    gap: 15px;
    margin-top: 20px;
}

.item-card, .progress-item {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 15px;
}

.progress-bar {
    background: #333;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
}

@media(max-width:768px){
    header h1 {font-size:2rem;}
}
</style>
<link rel="stylesheet" href="Header_and_footer.css">
    
</head>

<body>

<special-header></special-header>
<div class="container">

<section class="features">
    <div class="feature-card" onclick="showSection('designs')">
        <h2>Designs & Notes</h2>
        <p>Save design ideas and important notes.</p>
    </div>

    <div class="feature-card" onclick="showSection('meetings')">
        <h2>Meetings</h2>
        <p>Schedule meetings and keep notes.</p>
    </div>

    <div class="feature-card" onclick="showSection('progress')">
        <h2>Progress</h2>
        <p>Track task completion and status.</p>
    </div>
</section>

<!-- DESIGNS -->
<div id="designs" class="section">
<h2>Designs & Notes</h2>

<input id="designTitle" placeholder="Title"><br><br>
<textarea id="designDescription" placeholder="Description"></textarea><br><br>
<input id="designCategory" placeholder="Category">
<input type="date" id="designDate"><br><br>

<div class="btn-container">
<button class="btn-primary" onclick="addDesign()">Add</button>
<button class="btn-secondary" onclick="clearDesignForm()">Clear</button>
</div>

<div id="designsList" class="item-list"></div>
</div>

<!-- MEETINGS -->
<div id="meetings" class="section">
<h2>Meetings</h2>

<input id="meetingTitle" placeholder="Meeting Title"><br><br>
<input type="date" id="meetingDate">
<input type="time" id="meetingTime"><br><br>
<input id="meetingAttendees" placeholder="Attendees"><br><br>
<textarea id="meetingNotes" placeholder="Notes"></textarea>

<div class="btn-container">
<button class="btn-primary" onclick="addMeeting()">Add</button>
<button class="btn-secondary" onclick="clearMeetingForm()">Clear</button>
</div>

<div id="meetingsList" class="item-list"></div>
</div>

<!-- PROGRESS -->
<div id="progress" class="section">
<h2>Progress</h2>

<input id="progressTitle" placeholder="Task Title"><br><br>
<textarea id="progressDescription" placeholder="Description"></textarea><br><br>
<input type="number" id="progressPercent" placeholder="0">
<select id="progressStatus">
<option>Not Started</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<div class="btn-container">
<button class="btn-primary" onclick="addProgress()">Add</button>
<button class="btn-secondary" onclick="clearProgressForm()">Clear</button>
</div>

<div id="progressList" class="item-list"></div>
</div>

</div>

    <special-footer></special-footer>
    <script src = 'headerFooterManager.js' defer></script>

<script src = 'Header_and_Footer.js'></script> 

<script>
document.addEventListener('DOMContentLoaded', () => {
    setDesignDate();
    setMeetingDate();
    renderDesigns();
    renderMeetings();
    renderProgress();
});

function showSection(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function addDesign(){
let title=document.getElementById('designTitle').value;
let description=document.getElementById('designDescription').value;
let category=document.getElementById('designCategory').value;
let date=document.getElementById('designDate').value;

let designs=JSON.parse(localStorage.getItem('designs')||"[]");
designs.push({id:Date.now(),title,description,category,date});
localStorage.setItem('designs',JSON.stringify(designs));
renderDesigns();
clearDesignForm();
}

function renderDesigns(){
let list=document.getElementById('designsList');
let designs=JSON.parse(localStorage.getItem('designs')||"[]");
list.innerHTML=designs.map(d=>`
<div class="item-card">
<h3>${d.title}</h3>
<p>${d.description}</p>
<button class="btn-delete" onclick="deleteDesign(${d.id})">Delete</button>
</div>`).join('');
}

function deleteDesign(id){
let designs=JSON.parse(localStorage.getItem('designs'));
designs=designs.filter(d=>d.id!==id);
localStorage.setItem('designs',JSON.stringify(designs));
renderDesigns();
}

function clearDesignForm(){
designTitle.value="";
designDescription.value="";
designCategory.value="";
setDesignDate();
}

function addMeeting(){
let title=meetingTitle.value;
let date=meetingDate.value;
let time=meetingTime.value;
let attendees=meetingAttendees.value;
let notes=meetingNotes.value;

let meetings=JSON.parse(localStorage.getItem('meetings')||"[]");
meetings.push({id:Date.now(),title,date,time,attendees,notes});
localStorage.setItem('meetings',JSON.stringify(meetings));
renderMeetings();
clearMeetingForm();
}

function renderMeetings(){
let list=document.getElementById('meetingsList');
let meetings=JSON.parse(localStorage.getItem('meetings')||"[]");
list.innerHTML=meetings.map(m=>`
<div class="item-card">
<h3>${m.title}</h3>
<p>${m.notes}</p>
<button class="btn-delete" onclick="deleteMeeting(${m.id})">Delete</button>
</div>`).join('');
}

function deleteMeeting(id){
let meetings=JSON.parse(localStorage.getItem('meetings'));
meetings=meetings.filter(m=>m.id!==id);
localStorage.setItem('meetings',JSON.stringify(meetings));
renderMeetings();
}

function clearMeetingForm(){
meetingTitle.value="";
meetingAttendees.value="";
meetingNotes.value="";
meetingTime.value="";
setMeetingDate();
}


function addProgress(){
let title=progressTitle.value;
let description=progressDescription.value;
let percent=progressPercent.value;
let status=progressStatus.value;

let progress=JSON.parse(localStorage.getItem('progress')||"[]");
progress.push({id:Date.now(),title,description,percent,status});
localStorage.setItem('progress',JSON.stringify(progress));
renderProgress();
clearProgressForm();
}

function renderProgress(){
let list=document.getElementById('progressList');
let progress=JSON.parse(localStorage.getItem('progress')||"[]");
list.innerHTML=progress.map(p=>`
<div class="progress-item">
<h3>${p.title}</h3>
<div class="progress-bar">
<div class="progress-fill" style="width:${p.percent}%"></div>
</div>
<p>${p.percent}% - ${p.status}</p>
<button class="btn-delete" onclick="deleteProgress(${p.id})">Delete</button>
</div>`).join('');
}

function deleteProgress(id){
let progress=JSON.parse(localStorage.getItem('progress'));
progress=progress.filter(p=>p.id!==id);
localStorage.setItem('progress',JSON.stringify(progress));
renderProgress();
}

function clearProgressForm(){
progressTitle.value="";
progressDescription.value="";
progressPercent.value="";
progressStatus.value="Not Started";
}

function setDesignDate(){
designDate.value=new Date().toISOString().split('T')[0];
}

function setMeetingDate(){
meetingDate.value=new Date().toISOString().split('T')[0];
}
</script>
<script src="menu_button.js"></script> 
</body>
</html>
