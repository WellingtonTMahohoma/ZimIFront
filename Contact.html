<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container Layout */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 900px;
            width: 95%;
            background: #131314;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Sidebar Info */
        .contact-info {
            flex: 1;
            background: #00FF88;
            color: black;
            padding: 40px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2 {
            margin-top: 0;
            font-size: 28px;
        }

        .contact-info p {
            line-height: 1.6;
            opacity: 0.9;
        }

        .info-details {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .info-details li {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        /* Form Side */
        .contact-form {
            flex: 1.5;
            padding: 40px;
            min-width: 300px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #00FF88;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus, 
        .input-group textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: #00FF88;
            color: black;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        #success-msg {
            display: none;
            color: #10b981;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }

        /* Responsive Tweak */
        @media (max-width: 768px) {
            .contact-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Have a question or a project in mind? We'd love to hear from you.</p>
        
        <ul class="info-details">
            <li>📧 &nbsp; hello@zimfront.com</li>
            <li>📞 &nbsp; +91 768 208 1347</li>
            <li>📍 &nbsp; Kp-26 Starcity ,Odisha</li>
        </ul>
    </div>

    <form class="contact-form" id="main-contact-form">
        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="How can we help?" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
        <div id="success-msg">Message sent successfully!</div>
    </form>
</div>

<script>
    // Simple script to handle form submission UI
    document.getElementById('main-contact-form').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop the page from reloading
        
        // Change button text and show success message
        const btn = document.querySelector('.submit-btn');
        const msg = document.getElementById('success-msg');
        
        btn.innerText = "Sending...";
        btn.disabled = true;

        setTimeout(() => {
            btn.style.display = 'none';
            msg.style.display = 'block';
        }, 1000);
    });
</script>

</body>
</html>
